<div id="tavago_settings" class="tavago-settings">
    <div class="tavago-title">
        <i class="fa-solid fa-language"></i>
        <span>Tavago</span>
    </div>

    <label class="tavago-label" for="tavago_target_language">
        번역할 언어
    </label>
    <input id="tavago_target_language" class="text_pole" type="text" value="Korean" />

    <label class="tavago-label" for="tavago_system_prompt">
        번역 지시문
    </label>
    <textarea id="tavago_system_prompt" class="text_pole textarea_compact" rows="5"></textarea>

    <div class="tavago-actions">
        <button id="tavago_translate_input" class="menu_button">
            <i class="fa-solid fa-language"></i>
            <span>입력창 번역</span>
        </button>
    </div>
</div>
